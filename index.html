<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Robert E. Barry, Esq. | 24Law</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Inter', sans-serif;
      color: white;
      background: #111;
    }

    .hero {
      min-height: 100vh;
      background:
        linear-gradient(rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0.72)),
        url('building.jpg') center center / cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      animation: fadeIn 1.1s ease;
    }

    .container {
      max-width: 760px;
      width: 100%;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      letter-spacing: 4px;
      margin-bottom: 26px;
      opacity: 0.92;
    }

    .divider {
      width: 88px;
      height: 2px;
      background: rgba(255, 255, 255, 0.8);
      margin: 0 auto 28px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 600;
      font-size: 58px;
      line-height: 1.08;
      letter-spacing: 0.5px;
      margin-bottom: 18px;
      text-shadow: 0 2px 16px rgba(0, 0, 0, 0.28);
    }

    .tagline {
      font-size: 22px;
      font-weight: 300;
      line-height: 1.5;
      opacity: 0.96;
      margin-bottom: 16px;
    }

    .location {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      opacity: 0.78;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 768px) {
      .logo {
        font-size: 17px;
        letter-spacing: 3px;
        margin-bottom: 22px;
      }

      .divider {
        width: 72px;
        margin-bottom: 24px;
      }

      h1 {
        font-size: 38px;
        margin-bottom: 16px;
      }

      .tagline {
        font-size: 18px;
        margin-bottom: 14px;
      }

      .location {
        font-size: 12px;
        letter-spacing: 2px;
      }
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="container">
      <div class="logo">24LAW</div>
      <div class="divider"></div>
      <h1>Robert E. Barry, Esq.</h1>
      <p class="tagline">New Phoenix Office Opening Soon</p>
      <p class="location">Phoenix, Arizona</p>
    </div>
  </section>
</body>
</html>
